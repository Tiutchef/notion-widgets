<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      overflow: hidden;
    }

    .clock-widget {
      width: 250px;
      max-width: 100%;
      box-sizing: border-box;
      padding: 2px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 20px 1fr;
      align-items: center;
      column-gap: 6px;
    }

    .time-box {
      height: 68px;
      border: 2px solid #0b2a35;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 800;
      line-height: 1;
      background: transparent;
    }

    .colon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      padding-bottom: 4px;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .day-name,
    .full-date {
      font-size: 17px;
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="clock-widget">
    <div class="time-row">
      <div class="time-box" id="hours">16</div>
      <div class="colon">:</div>
      <div class="time-box" id="minutes">40</div>
    </div>

    <div class="date-row">
      <div class="day-name" id="dayName">Tuesday</div>
      <div class="full-date" id="fullDate">23 June 2026</div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      const days = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday"
      ];

      const months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December"
      ];

      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("dayName").textContent = days[now.getDay()];
      document.getElementById("fullDate").textContent =
        now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear();
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
