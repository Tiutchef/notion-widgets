<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      overflow: hidden;
    }

    .progress-widget {
      width: 285px;
      padding: 4px;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      grid-template-columns: 170px 1fr;
      align-items: center;
      column-gap: 10px;
      margin-bottom: 8px;
    }

    .bar-frame {
      width: 170px;
      height: 22px;
      border: 2px solid #222;
      border-radius: 4px;
      box-sizing: border-box;
      padding: 3px;
      background: transparent;
    }

    .bar-fill {
      height: 100%;
      background: #222;
      border-radius: 1px;
    }

    .label {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="progress-widget">
    <div class="row">
      <div class="bar-frame">
        <div class="bar-fill" id="yearBar"></div>
      </div>
      <div class="label" id="yearLabel">Year: 0%</div>
    </div>

    <div class="row">
      <div class="bar-frame">
        <div class="bar-fill" id="monthBar"></div>
      </div>
      <div class="label" id="monthLabel">Month: 0%</div>
    </div>

    <div class="row">
      <div class="bar-frame">
        <div class="bar-fill" id="lifeBar"></div>
      </div>
      <div class="label" id="lifeLabel">Life: 36%</div>
    </div>
  </div>

  <script>
    function getYearProgress() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 1);
      const end = new Date(now.getFullYear() + 1, 0, 1);

      return Math.round(((now - start) / (end - start)) * 100);
    }

    function getMonthProgress() {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), 1);
      const end = new Date(now.getFullYear(), now.getMonth() + 1, 1);

      return Math.round(((now - start) / (end - start)) * 100);
    }

    function updateProgress() {
      const now = new Date();

      const months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December"
      ];

      const year = getYearProgress();
      const month = getMonthProgress();

      const currentYear = now.getFullYear();
      const currentMonth = months[now.getMonth()];

      const currentAge = 27;
      const expectedAge = 75;
      const life = Math.round((currentAge / expectedAge) * 100);

      document.getElementById("yearBar").style.width = year + "%";
      document.getElementById("monthBar").style.width = month + "%";
      document.getElementById("lifeBar").style.width = life + "%";

      document.getElementById("yearLabel").textContent = "Year " + currentYear + ": " + year + "%";
      document.getElementById("monthLabel").textContent = "Month " + currentMonth + ": " + month + "%";
      document.getElementById("lifeLabel").textContent = "Life: " + life + "%";
    }

    updateProgress();
    setInterval(updateProgress, 60000);
  </script>
</body>
</html>
